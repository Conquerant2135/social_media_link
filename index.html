<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <section class="links-card">
        <div class="container">
          <div class="card">
            <div class="card-info">
              <img
                src="assets/images/avatar-jessica.jpeg"
                alt=""
                class="image"
              />
              <div class="perso-info">
                <p class="name">Jessica Randall</p>
                <p class="location">London, United Kingdom</p>
              </div>
              <p class="descr">"Front-end developer and avid reader."</p>
            </div>
            <div class="card-links">
              <a href="#" class="list-item">GitHub</a>
              <a href="#" class="list-item">Frontend Mentor</a>
              <a href="#" class="list-item">LinkedIn</a>
              <a href="#" class="list-item">Twitter</a>
              <a href="#" class="list-item">Instagram</a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
